<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="utf-8">
  <title>Banner 1250x400</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
    }

    /* ── Fixed banner shell ───────────────────────────── */
    .banner {
      position: relative;
      width: 1250px;
      height: 400px;
      overflow: hidden;
      /* light green gradient matching reference */
      background: linear-gradient(135deg, #c8f0c0 0%, #e8fae0 60%, #d0f0c8 100%);
      font-family: Arial, sans-serif;
    }

    /* ── Swiper row: bottom-center ────────────────────── */
    /* Positioned to mirror the reference:
       left offset = ~165px (past the static left col),
       top offset = ~125px so it's vertically centered in lower 3/4 */
    .swiper-wrap {
      position: absolute;
      top: 100px;
      left: 165px;
      width: 920px;
      height: 250px;
    }

    .swiper {
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    .swiper-slide {
      width: 300px;
      height: 250px;
    }

    .swiper-slide img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 4px;
      transform: scale(0.95);
      transition: transform 0.125s ease-in-out;
    }
    .swiper-slide img:hover {
      transform: scale(1);
    }

    /* ── Nav arrows ───────────────────────────────────── */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 100;
      width: 36px;
      height: 36px;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.15s;
    }
    .nav-btn:hover { opacity: 1; }
    .nav-btn--prev { left: -46px; }
    .nav-btn--next { right: -46px; }
    .nav-btn svg { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <script>
        var olBanner = {
      getQueryStringValue: function(key) {
        return decodeURIComponent(window.location.search.replace(
          new RegExp("^(?:.*[&?]" + encodeURIComponent(key).replace(/[.+*]/g,"$&") + "(?:=([^&]*))?)?.*$","i"), "$1"
        ));
      },
      getClickTag: function(customDestinationUrl) {
        this.clickMacro = this.getQueryStringValue("clickMacro");
        this.clickTag   = this.getQueryStringValue("clickTag");
        return (customDestinationUrl && customDestinationUrl.length > 0)
          ? this.clickMacro + customDestinationUrl
          : this.clickTag;
      }
    };
    var clickTag = "";
  </script>

  <div class="banner">

    <!-- Swiper with left/right nav -->
    <div class="swiper-wrap">

      <div class="nav-btn nav-btn--prev">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 42">
          <path fill="#000" fill-opacity=".333" d="M38,42H4C1.8,42,0,40.2,0,38V4C0,1.8,1.8,0,4,0h34C40.2,0,42,1.8,42,4v34C42,40.2,40.2,42,38,42Z"/>
          <path fill="#fff" d="M17.2,21l9.2,9.2-2.8,2.8-12-12,12-12,2.8,2.8L17.2,21Z"/>
        </svg>
      </div>

      <div class="swiper mySwiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide" onclick="window.open(olBanner.getClickTag('https://onoff.ee/promo'),'_blank')">
            <img src="https://picsum.photos/seed/card1/300/250" alt="">
          </div>
          <div class="swiper-slide" onclick="window.open(olBanner.getClickTag('https://onoff.ee/et/71-pesumasinad'),'_blank')">
            <img src="https://picsum.photos/seed/card2/300/250" alt="">
          </div>
          <div class="swiper-slide" onclick="window.open(olBanner.getClickTag('https://onoff.ee/et/brand/505-dreame'),'_blank')">
            <img src="https://picsum.photos/seed/card3/300/250" alt="">
          </div>
          <div class="swiper-slide" onclick="window.open(olBanner.getClickTag('https://onoff.ee/et/brand/45-philips'),'_blank')">
            <img src="https://picsum.photos/seed/card4/300/250" alt="">
          </div>
        </div>
      </div>

      <div class="nav-btn nav-btn--next">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 42">
          <path fill="#000" fill-opacity=".333" d="M38,42H4C1.8,42,0,40.2,0,38V4C0,1.8,1.8,0,4,0h34C40.2,0,42,1.8,42,4v34C42,40.2,40.2,42,38,42Z"/>
          <path fill="#fff" d="M24.8,21l-9.2-9.2,2.8-2.8,12,12-12,12-2.8-2.8L24.8,21Z"/>
        </svg>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    new Swiper(".mySwiper", {
      grabCursor: true,
      loop: true,
      slidesPerView: 3,
      spaceBetween: 10,
      speed: 500,
      autoplay: {
        delay: 2000,
        disableOnInteraction: false
      },
      navigation: {
        prevEl: ".nav-btn--prev",
        nextEl: ".nav-btn--next"
      }
    });
  </script>
</body>
</html>
