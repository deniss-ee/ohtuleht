<!doctype html>
<html lang="et">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Epicbet Banner</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #0e1120;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        gap: 32px;
        font-family: system-ui, sans-serif;
      }

      /* ── Banner ── */
      .sponsor-banner {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        background: #111627;
        height: 48px;
        padding: 0 20px;
        width: 100%;
      }

      .sponsor-label {
        font-family: "Poppins", system-ui;
        font-size: 12px;
        font-weight: 500;
        text-transform: uppercase;
        color: #b6b8c8;
        white-space: nowrap;
        line-height: 1;
      }

      .sponsor-logo svg {
        height: 16px;
        width: auto;
        display: block;
      }

      /* ── at 720px+ flip to row ── */
      @media (min-width: 540px) {
        .sponsor-banner {
          flex-direction: row;
          gap: 14px;
        }

        .sponsor-logo svg {
          height: 20px;
        }

        .sponsor-label {
          font-size: 12px;
        }

        /* vertical divider between label and logo */
        .sponsor-banner::after {
          content: "";
          display: block;
          width: 1px;
          height: 16px;
          background: #2c3558;
          order: 1;
        }

        .sponsor-label {
          order: 0;
        }

        .sponsor-logo {
          order: 2;
        }
      }
    </style>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
