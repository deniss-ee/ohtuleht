; ============================================================
; Beta-tester automation config
; ------------------------------------------------------------
; Each [TaskN] section defines one independent automation.
; Edit values below, save, then press F12 in-game to reload
; without restarting the script.
;
; Fields:
;   Enabled    = 1 or 0          - task is active on script start
;   Hotkey     = e.g. F1         - toggles this task on/off at runtime
;   Mode       = TimerOnly       - click every Interval ms, no pixel check
;              | PixelOnly       - check pixel every Interval ms, click only if it matches
;              | PixelTimer      - same as PixelOnly (kept for clarity, both conditions = pixel match gate)
;   X, Y       = pixel to check (screen coordinates) - ignored for TimerOnly
;   Color      = expected color in 0xRRGGBB - ignored for TimerOnly
;   Tolerance  = 0-255 per-channel tolerance for color match - ignored for TimerOnly
;   Interval   = how often to check/click, in milliseconds
;   ClickX     = where to click (screen coordinates)
;   ClickY     = where to click
;   ClickType  = Left | Right | Double
;
; Tip: Use AHK's built-in "Window Spy" (right-click the AHK tray icon ->
; "Window Spy") to find pixel coordinates and colors by hovering your mouse.
; ============================================================

[Task1]
Enabled=1
Hotkey=F1
Mode=TimerOnly
Interval=2000
ClickX=512
ClickY=384
ClickType=Left

[Task2]
Enabled=0
Hotkey=F2
Mode=PixelOnly
X=100
Y=200
Color=0xFFFFFF
Tolerance=10
Interval=500
ClickX=100
ClickY=200
ClickType=Left
