<html lang="en">

    <title>Page break iframe v2.6.2</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;

        background: transparent;

        position: fixed;

        height: 100vh;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      .content {
        position: relative;
        width: 100vw;
        height: 100%;
        max-width: 600px;
        overflow: hidden;

      #adIframe {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        min-height: 100vh;
        border: 0;
        display: block;
        margin: 0 auto;
      }

      .fallback-image {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        max-height: 100vh;
        border: 0;
        display: none;
        object-fit: contain;
        aspect-ratio: 9 / 16;
      }

      #tracking-code {
        display: none;
      }

      #video-controls {
        display: none;

        position: fixed;
        top: 67px;
        right: 45px;
        z-index: 2147483647 !important;
        margin: 0;
        padding: 0;
        align-items: center;
        gap: 8px;
        background: transparent !important;
        pointer-events: auto !important;
        isolation: isolate;
      }

      #video-controls > button {
        position: relative;
        z-index: 1;
        -webkit-appearance: none;

        background: transparent !important;
        background-color: transparent !important;
        background-size: 30px;
        background-repeat: no-repeat;
        background-position: center;
        width: 48px;
        height: 48px;
        padding: 0;
        border: none;
        opacity: 0.7;
        border-radius: 24px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        line-height: 0;
        box-shadow: none;
        -webkit-tap-highlight-color: transparent;
        overflow: visible;
      }

      #video-controls > button:hover {
        opacity: 1;
      }

      #video-controls > button:focus {
        outline: none;
        box-shadow: none;
      }

      #video-controls > button svg {
        pointer-events: none;
        position: relative;
        z-index: 1;
        filter: drop-shadow(0 0 2px rgba(0, 0, 0, 0.75)) drop-shadow(0 0 4px rgba(0, 0, 0, 0.5)) drop-shadow(0 0 8px rgba(0, 0, 0, 0.25));
      }

      #video-control-audio {
        background-image: none !important;
      }

      #video-control-playback {
        background-image: none !important;
      }

      #video:focus {
        outline: none;
      }

      #video {
        position: fixed;
        top: 0;
        left: 50%;
        width: 100vw;
        max-height: 100vh;
        aspect-ratio: 9 / 16;
        display: none;
        transform: translateX(-50%);
        overflow: hidden;
      }

      #video video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
      }
    </style>
  </head>
  <script>

        clickMacroUrl: "%%CLICK_URL_ESC%%",

        iframeClickTagType: "[%iframeClickTagType%]",

      layout: {

      interscroller: {
        extraScrollRoomPx: 80,

      classes: {
        iframe: "page-break-iframe",
        slot: "page-break-slot",
        styleId: "page-break-interscroller-style",
        nextContentTarget: "page-break-next-content-target",
        nextContentActive: "page-break-next-content-active",

    const variables = {
      clickMacroUrl: CONFIG.gam.clickMacroUrl,

      videoControls: CONFIG.template.videoControls,
      iframeClickTagType: CONFIG.template.iframeClickTagType,
      reTargetingPixelUrl: CONFIG.template.reTargetingPixelUrl,
    };
  </script>

    <script>
      const childIframe = document.getElementById("adIframe");
      const fallbackImage = document.getElementById("adImage");
      const videoContainer = document.getElementById("video");

      const iframeUrl = childIframe ? childIframe.getAttribute("src") || "" : "";
      const imageUrl = fallbackImage ? fallbackImage.getAttribute("src") || "" : "";
      const videoElement = videoContainer ? videoContainer.querySelector("video") : null;
      const configuredVideoSource = videoElement ? videoElement.querySelector("source") : null;
      const videoUrl = configuredVideoSource ? configuredVideoSource.getAttribute("src") || "" : "";

      function decodeHtmlEntities(value) {
        const textarea = document.createElement("textarea");
        textarea.innerHTML = value;
        return textarea.value;
      }

      function hasRealValue(value) {
        return !!value && !value.includes("[%") && !value.includes("%%");
      }

      function shouldShowVideoControls(inputValue) {
        const raw = decodeHtmlEntities((inputValue || "").trim()).toLowerCase();
        if (!raw || raw.includes("[%") || raw.includes("%%")) {
          return true;
        }
        return raw !== "hidden";
      }

      const hasVideoUrl = hasRealValue(videoUrl);
      const hasIframeUrl = hasRealValue(iframeUrl);
      const hasImageUrl = hasRealValue(imageUrl);
      const showVideoControls = shouldShowVideoControls(variables.videoControls || "");

      const isVideoMode = hasVideoUrl;
      const isIframeMode = !isVideoMode && hasIframeUrl;
      const isImageMode = !isVideoMode && !hasIframeUrl && hasImageUrl;

      const IFRAME_TOP_OFFSET_PX = CONFIG.layout.iframeTopOffsetPx;
      const VIDEO_CONTROLS_FIXED_TOP_PX = CONFIG.layout.videoControlsTopPx;
      const VIDEO_CONTROLS_FIXED_RIGHT_PX = CONFIG.layout.videoControlsRightPx;
      const CONTENT_MAX_WIDTH_PX = CONFIG.layout.contentMaxWidthPx;
      let clickLayerElement = null;

      function applyFixedVideoControlsPosition(controls) {
        controls.style.top = `${VIDEO_CONTROLS_FIXED_TOP_PX}px`;
        controls.style.right = `${VIDEO_CONTROLS_FIXED_RIGHT_PX}px`;
      }

      function getContentFrame() {
        const width = Math.min(window.innerWidth, CONTENT_MAX_WIDTH_PX);
        const left = Math.max(0, Math.floor((window.innerWidth - width) / 2));
        return { width, left };
      }

      function applyContentFrame(element, options) {
        const opts = options || {};
        const contentFrame = getContentFrame();
        const height = Math.min(contentFrame.width * (16 / 9), window.innerHeight - IFRAME_TOP_OFFSET_PX);

        element.style.left = `${contentFrame.left}px`;
        element.style.right = "auto";
        element.style.top = `${IFRAME_TOP_OFFSET_PX}px`;
        element.style.width = `${contentFrame.width}px`;
        element.style.height = `${height}px`;

        if (opts.setMinHeight) {
          element.style.minHeight = `${height}px`;
        }

        if (opts.innerVideoElement) {
          opts.innerVideoElement.style.width = "100%";
          opts.innerVideoElement.style.height = "100%";
          opts.innerVideoElement.style.top = "0px";
        }

        if (clickLayerElement) {
          clickLayerElement.style.left = `${contentFrame.left}px`;
          clickLayerElement.style.width = `${contentFrame.width}px`;
          clickLayerElement.style.top = `${IFRAME_TOP_OFFSET_PX}px`;
          clickLayerElement.style.height = `${height}px`;
        }
      }

      function updateIframeFrame() {
        if (!isIframeMode || !childIframe) return;
        applyContentFrame(childIframe, { setMinHeight: true });
      }

      function updateVideoFrame() {
        if (!isVideoMode || !videoContainer) return;
        videoContainer.style.transform = "none";
        applyContentFrame(videoContainer, { innerVideoElement: videoContainer.querySelector("video") });
      }

      if (hasVideoUrl && (hasIframeUrl || hasImageUrl)) {
        console.warn("videoUrl is set. Ignoring iframeUrl and imageUrl.");
      } else if (hasIframeUrl && hasImageUrl) {
        console.warn("Both iframeUrl and imageUrl are set. Using iframeUrl and hiding imageUrl.");
      }

      if (videoContainer) {
        videoContainer.style.display = isVideoMode ? "block" : "none";
      }

      if (fallbackImage && isImageMode) {
        fallbackImage.setAttribute("src", imageUrl);
      }

      if (childIframe) {
        if (isIframeMode) {
          updateIframeFrame();
        } else {
          childIframe.style.display = "none";
          childIframe.removeAttribute("src");
        }
      }

      if (videoContainer && isVideoMode) {
        updateVideoFrame();
      }

      if (fallbackImage) {
        fallbackImage.style.display = isImageMode ? "block" : "none";
        if (!isImageMode) {
          fallbackImage.removeAttribute("src");
        }
      }

      function fitImageToViewport() {
        if (!fallbackImage || !isImageMode) return;
        applyContentFrame(fallbackImage);
      }

      function fitVideoToViewport() {
        if (!videoContainer || !isVideoMode) return;
        updateVideoFrame();
      }

      if (fallbackImage) {
        fallbackImage.addEventListener("load", fitImageToViewport);
      }
      function handleViewportResize() {
        fitImageToViewport();
        fitVideoToViewport();
        updateIframeFrame();
      }
      window.addEventListener("resize", handleViewportResize, { passive: true });
      updateIframeFrame();
      updateVideoFrame();
      fitImageToViewport();

      function setupFriendlyIframe() {
        try {
          const gptIframe = window.frameElement;
          if (!gptIframe) return false;

          const parentDoc = window.parent.document;
          let parent = gptIframe.parentElement;
          let cursor = parent;
          while (cursor && cursor !== parentDoc.body) {
            if (cursor.getAttribute("role") === "region") {
              parent = cursor;
              break;
            }
            cursor = cursor.parentElement;
          }

          const IFRAME_CLASS = CONFIG.classes.iframe;
          const SLOT_CLASS = CONFIG.classes.slot;
          const STYLE_ID = CONFIG.classes.styleId;
          const EXTRA_SCROLL_ROOM_PX = CONFIG.interscroller.extraScrollRoomPx;
          const SNAP_TOP_TOLERANCE_PX = CONFIG.interscroller.snapTopTolerancePx;
          const NEXT_CONTENT_TOP_BLEED_PX = CONFIG.interscroller.nextContentTopBleedPx;
          const parentWin = window.parent;
          const NEXT_CONTENT_TARGET_CLASS = CONFIG.classes.nextContentTarget;
          const NEXT_CONTENT_ACTIVE_CLASS = CONFIG.classes.nextContentActive;
          const NEXT_CONTENT_LAYER_CLASS = CONFIG.classes.nextContentLayer;
          let nextContentElements = [];
          let nextContentTargetsResolved = false;
          let nextContentAnchor = null;
          let nextContentSourceElement = null;

          gptIframe.classList.add(IFRAME_CLASS);
          parent.classList.add(SLOT_CLASS);
          parent.style.setProperty("height", `calc(100vh + ${EXTRA_SCROLL_ROOM_PX}px)`, "important");

          gptIframe.style.position = "fixed";
          gptIframe.style.top = "0";
          gptIframe.style.left = "0";
          gptIframe.style.width = "100vw";
          gptIframe.style.height = "100vh";
          gptIframe.style.zIndex = "0";
          gptIframe.style.opacity = "0";
          gptIframe.style.visibility = "hidden";
          gptIframe.style.pointerEvents = "none";
          gptIframe.removeAttribute("width");
          gptIframe.removeAttribute("height");
          gptIframe.setAttribute("gam-creative-template", "true");

          function fitFixedIframeToViewport() {
            gptIframe.style.top = "0";
            gptIframe.style.height = "100vh";

            const rect = gptIframe.getBoundingClientRect();
            const topOffset = rect.top;
            if (Math.abs(topOffset) > 1) {
              gptIframe.style.top = `${-topOffset}px`;
              gptIframe.style.height = `calc(100vh + ${topOffset}px)`;
            }
          }

          requestAnimationFrame(fitFixedIframeToViewport);

          {
            let style = parentDoc.getElementById(STYLE_ID);
            if (!style) {
              style = parentDoc.createElement("style");
              style.id = STYLE_ID;
              parentDoc.head.appendChild(style);
            }

            style.textContent = `
          .page-break-slot[gam-creative-slot], .page-break-slot {
            position: relative !important;
            height: calc(100vh + ${EXTRA_SCROLL_ROOM_PX}px) !important;
            width: 100vw !important;
            margin-left: calc(50% - 50vw) !important;
            background: transparent !important;
            z-index: 0 !important;
            overflow: hidden !important;
          }

          .page-break-iframe[gam-creative-template], .page-break-iframe {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 0 !important;
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
          }

          .page-break-iframe.page-break-active {
            opacity: 1 !important;
            visibility: visible !important;
            pointer-events: auto !important;
          }

main section {
            position: relative !important;
            z-index: 1 !important;
          }

          .${NEXT_CONTENT_TARGET_CLASS} {
            position: relative !important;
          }

          .${NEXT_CONTENT_TARGET_CLASS}.${NEXT_CONTENT_ACTIVE_CLASS} {
            background: #fff !important;
            overflow: visible !important;
          }

          .${NEXT_CONTENT_TARGET_CLASS} > .${NEXT_CONTENT_LAYER_CLASS} {
            position: absolute !important;
            top: -${NEXT_CONTENT_TOP_BLEED_PX}px !important;
            left: 50% !important;
            width: 100vw !important;
            height: calc(100% + ${NEXT_CONTENT_TOP_BLEED_PX}px) !important;
            margin-left: -50vw !important;
            z-index: 0 !important;
            display: none !important;
            background: #fff !important;
            pointer-events: none !important;
          }

          .${NEXT_CONTENT_TARGET_CLASS}.${NEXT_CONTENT_ACTIVE_CLASS} > .${NEXT_CONTENT_LAYER_CLASS} {
            display: block !important;
          }

          .${NEXT_CONTENT_TARGET_CLASS} > *:not(.${NEXT_CONTENT_LAYER_CLASS}) {
            position: relative !important;
            z-index: 1 !important;
          }
        `;
          }

          function isVisibleNextContentCandidate(element) {
            if (!element) return false;
            const tagName = element.tagName;
            if (tagName === "SCRIPT" || tagName === "STYLE" || tagName === "NOSCRIPT" || tagName === "TEMPLATE") {
              return false;
            }
            const computed = parentWin.getComputedStyle(element);
            return computed.display !== "none" && computed.visibility !== "hidden";
          }

          function isSlotBoundaryElement(element) {
            if (!element) return false;
            if (element.classList && element.classList.contains(SLOT_CLASS)) {
              return true;
            }
            return !!(element.querySelector && element.querySelector(`.${SLOT_CLASS}`));
          }

          function resolveNextContentSourceElement() {
            let source = parent;
            while (source && source !== parentDoc.body) {
              let probe = source.nextElementSibling;
              while (probe) {
                if (isVisibleNextContentCandidate(probe)) {
                  return source;
                }
                probe = probe.nextElementSibling;
              }
              source = source.parentElement;
            }
            return parent;
          }

          function collectNextVisibleSiblingElements(sourceElement) {
            const candidates = [];
            let candidate = sourceElement ? sourceElement.nextElementSibling : null;

            while (candidate) {
              if (isSlotBoundaryElement(candidate)) {
                break;
              }

              if (isVisibleNextContentCandidate(candidate)) {
                candidates.push(candidate);
              }
              candidate = candidate.nextElementSibling;
            }

            return candidates;
          }

          function ensureLayerForTargetElement(targetElement) {
            targetElement.classList.add(NEXT_CONTENT_TARGET_CLASS);
            targetElement.style.setProperty("position", "relative", "important");

            let layer = targetElement.firstElementChild;
            if (!(layer && layer.classList && layer.classList.contains(NEXT_CONTENT_LAYER_CLASS))) {
              layer = null;
            }
            if (!layer) {
              layer = parentDoc.createElement("div");
              layer.className = NEXT_CONTENT_LAYER_CLASS;
              targetElement.insertBefore(layer, targetElement.firstChild);
            }

            layer.style.setProperty("position", "absolute", "important");
            layer.style.setProperty("top", `-${NEXT_CONTENT_TOP_BLEED_PX}px`, "important");
            layer.style.setProperty("left", "50%", "important");
            layer.style.setProperty("width", "100vw", "important");
            layer.style.setProperty("height", `calc(100% + ${NEXT_CONTENT_TOP_BLEED_PX}px)`, "important");
            layer.style.setProperty("margin-left", "-50vw", "important");
            layer.style.setProperty("z-index", "0", "important");
            layer.style.setProperty("background", "#fff", "important");
            layer.style.setProperty("pointer-events", "none", "important");

            return layer;
          }

          function shouldRebuildNextContentTargets(sourceElement) {
            if (!nextContentTargetsResolved) return true;
            if (!sourceElement || !sourceElement.isConnected) return true;
            if (nextContentSourceElement !== sourceElement) return true;
            if (nextContentAnchor !== sourceElement.nextElementSibling) return true;
            for (let i = 0; i < nextContentElements.length; i += 1) {
              if (!nextContentElements[i] || !nextContentElements[i].isConnected) {
                return true;
              }
            }
            return false;
          }

          function ensureNextContentLayers() {
            const sourceElement = resolveNextContentSourceElement();

            if (!shouldRebuildNextContentTargets(sourceElement)) {
              return nextContentElements.length > 0;
            }

            const candidates = collectNextVisibleSiblingElements(sourceElement);
            const candidateSet = new Set(candidates);

            nextContentElements.forEach((element) => {
              if (!candidateSet.has(element)) {
                element.classList.remove(NEXT_CONTENT_TARGET_CLASS);
                element.classList.remove(NEXT_CONTENT_ACTIVE_CLASS);
                element.style.removeProperty("background");
                element.style.removeProperty("overflow");

                const staleLayer = element.firstElementChild;
                if (staleLayer && staleLayer.classList && staleLayer.classList.contains(NEXT_CONTENT_LAYER_CLASS)) {
                  staleLayer.style.setProperty("display", "none", "important");
                }
              }
            });

            nextContentElements = candidates;
            nextContentTargetsResolved = true;
            nextContentSourceElement = sourceElement;
            nextContentAnchor = sourceElement ? sourceElement.nextElementSibling : null;
            nextContentElements.forEach(ensureLayerForTargetElement);
            return nextContentElements.length > 0;
          }

          function setNextContentLayerActive(isActive) {
            const hasTargets = ensureNextContentLayers();
            if (!hasTargets) return;

            nextContentElements.forEach((element) => {
              const layer = ensureLayerForTargetElement(element);

              if (isActive) {
                element.classList.add(NEXT_CONTENT_ACTIVE_CLASS);
                element.style.setProperty("background", "#fff", "important");
                element.style.setProperty("overflow", "visible", "important");
                if (layer) {
                  layer.style.setProperty("display", "block", "important");
                }
              } else {
                element.classList.remove(NEXT_CONTENT_ACTIVE_CLASS);
                element.style.removeProperty("background");
                element.style.removeProperty("overflow");
                if (layer) {
                  layer.style.setProperty("display", "none", "important");
                }
              }
            });
          }

          function clipAdToGap() {
            const slotRect = parent.getBoundingClientRect();
            const vpHeight = parentWin.innerHeight;
            const top = Math.max(0, slotRect.top);
            const topForFrame = top <= SNAP_TOP_TOLERANCE_PX ? 0 : top;

            if (isIframeMode && childIframe) {
              applyContentFrame(childIframe, { setMinHeight: true });
            }

            if (isVideoMode && videoContainer) {
              videoContainer.style.transform = "none";
              applyContentFrame(videoContainer, { innerVideoElement: videoContainer.querySelector("video") });
            }

            const bottom = Math.min(vpHeight, slotRect.bottom);

            if (topForFrame < bottom) {
              setNextContentLayerActive(true);
              gptIframe.style.clipPath = `inset(${topForFrame}px 0px ${vpHeight - bottom}px 0px)`;
              gptIframe.style.opacity = "1";
              gptIframe.style.visibility = "visible";
              gptIframe.style.pointerEvents = "auto";
              gptIframe.classList.add("page-break-active");
            } else {
              setNextContentLayerActive(false);
              gptIframe.style.clipPath = "inset(100% 0px 0px 0px)";
              gptIframe.style.opacity = "0";
              gptIframe.style.visibility = "hidden";
              gptIframe.style.pointerEvents = "none";
              gptIframe.classList.remove("page-break-active");
            }

            positionVideoControls(slotRect, vpHeight);
          }

          function positionVideoControls(slotRect, vpHeight) {
            if (!isVideoMode) return;

            const controls = document.getElementById("video-controls");
            if (!controls) return;

            if (!showVideoControls) {
              controls.style.display = "none";
              controls.style.visibility = "hidden";
              controls.style.pointerEvents = "none";
              return;
            }

            controls.style.display = "flex";

            const visibleTop = Math.max(0, slotRect.top);
            const visibleBottom = Math.min(vpHeight, slotRect.bottom);

            if (visibleTop >= visibleBottom) {
              controls.style.visibility = "hidden";
              controls.style.pointerEvents = "none";
              return;
            }

            applyFixedVideoControlsPosition(controls);
            controls.style.visibility = "visible";
            controls.style.pointerEvents = "auto";
          }

          let clipUpdateScheduled = false;

          function scheduleClipAdToGap() {
            if (clipUpdateScheduled) return;
            clipUpdateScheduled = true;
            parentWin.requestAnimationFrame(() => {
              clipUpdateScheduled = false;
              clipAdToGap();
            });
          }

          fitFixedIframeToViewport();
          scheduleClipAdToGap();
          parentWin.addEventListener("scroll", scheduleClipAdToGap, { passive: true });
          parentWin.addEventListener("resize", () => {
            fitFixedIframeToViewport();
            scheduleClipAdToGap();
          });

          return true;
        } catch (e) {
          console.warn("Cross-origin restriction. Cannot create interscroller effect.", e);
          return false;
        }
      }

      if (isIframeMode || isImageMode || isVideoMode) {
        setupFriendlyIframe();
      }

      function coverAdWithClickLayer() {
        const clickLayer = document.createElement("div");
        clickLayerElement = clickLayer;
        const useFramedLayout = isIframeMode || isVideoMode;
        const clickLayerTop = useFramedLayout ? `${IFRAME_TOP_OFFSET_PX}px` : "0";
        const clickLayerHeight = useFramedLayout ? `calc(100vh - ${IFRAME_TOP_OFFSET_PX}px)` : "100vh";
        clickLayer.style.cssText = `position:fixed;top:${clickLayerTop};left:0;width:100vw;height:${clickLayerHeight};cursor:pointer;z-index:1000;background:transparent;`;
        clickLayer.addEventListener("click", (event) => {
          if (isVideoMode) {
            const x = event.clientX;
            const y = event.clientY;

            clickLayer.style.pointerEvents = "none";
            const targetUnderLayer = document.elementFromPoint(x, y);
            clickLayer.style.pointerEvents = "auto";

            const controls = targetUnderLayer ? targetUnderLayer.closest("#video-controls") : null;
            if (controls) {
              const controlButton = targetUnderLayer.closest("button") || controls.querySelector("button");
              if (controlButton) {
                controlButton.click();
                return;
              }
            }
          }

          if (hasRealValue(variables.reTargetingPixelUrl)) {
            appendReTargetingPixel();
          }
          window.open(variables.clickMacroUrl + variables.clickThroughUrl, "_blank");
        });
        document.body.appendChild(clickLayer);
      }

      function appendReTargetingPixel() {
        var pixelImg = document.createElement("img");
        pixelImg.src = variables.reTargetingPixelUrl;
        pixelImg.style.display = "none";
        pixelImg.style.width = "1px";
        pixelImg.style.height = "1px";
        document.querySelector(".container").appendChild(pixelImg);
      }

      function appendClickTagsToIframeSrc() {
        if (!childIframe || !isIframeMode) return;
        if (!hasRealValue(iframeUrl)) return;
        var clickTag = variables.clickMacroUrl + variables.clickThroughUrl;
        var clickMacro = variables.clickMacroUrl;

        var separator = iframeUrl.includes("?") ? "&" : "?";
        childIframe.src = iframeUrl + separator + "clickTag=" + clickTag + "&clickMacro=" + clickMacro;
      }

      if (isImageMode || isVideoMode) {
        coverAdWithClickLayer();

        if (isImageMode) fitImageToViewport();
        if (isVideoMode) updateVideoFrame();
      } else if (isIframeMode) {
        if (hasRealValue(variables.iframeClickTagType) && variables.iframeClickTagType === "simple") {
          coverAdWithClickLayer();
        } else {
          appendClickTagsToIframeSrc();
        }
        updateIframeFrame();
      }

      function setVideoContent() {
        var video = document.querySelector("#video video");
        if (!video || !isVideoMode) return;

        var source = video.querySelector("source");
        if (!source) {
          source = document.createElement("source");
          video.appendChild(source);
        }
        if (hasRealValue(videoUrl)) {
          source.src = videoUrl;
        }
        if (!source.type) {
          source.type = "video/mp4";
        }
        video.addEventListener("loadedmetadata", fitVideoToViewport);
        video.addEventListener("canplay", fitVideoToViewport);
        video.addEventListener("play", updateVideoPlaybackButton);
        video.addEventListener("pause", updateVideoPlaybackButton);
        video.addEventListener("loadeddata", () => {
          updateVideoAudioButton();
          updateVideoPlaybackButton();
        });
        video.load();
        fitVideoToViewport();

        var controls = document.getElementById("video-controls");
        if (controls) {
          if (!showVideoControls) {
            controls.style.display = "none";
            controls.style.visibility = "hidden";
            controls.style.pointerEvents = "none";
          } else {
            controls.style.display = "flex";
            controls.style.visibility = "visible";
            controls.style.pointerEvents = "auto";
            applyFixedVideoControlsPosition(controls);
          }
        }

        updateVideoAudioButton();
        updateVideoPlaybackButton();
      }

      function updateVideoAudioButton() {
        var video = document.querySelector("#video video");
        var button = document.getElementById("video-control-audio");
        if (!video || !button) return;

        var volumeOnIcon = button.querySelector(".volume-on");
        var volumeOffIcon = button.querySelector(".volume-off");
        if (!volumeOnIcon || !volumeOffIcon) return;

        if (video.muted) {
          volumeOnIcon.style.display = "none";
          volumeOffIcon.style.display = "block";
        } else {
          volumeOnIcon.style.display = "block";
          volumeOffIcon.style.display = "none";
        }
      }

      function toggleVideoAudio() {
        var video = document.querySelector("#video video");
        if (!video) return;

        video.muted = !video.muted;
        updateVideoAudioButton();
      }

      function updateVideoPlaybackButton() {
        var video = document.querySelector("#video video");
        var button = document.getElementById("video-control-playback");
        if (!video || !button) return;

        var pauseIcon = button.querySelector(".playback-pause");
        var playIcon = button.querySelector(".playback-play");
        if (!pauseIcon || !playIcon) return;

        if (video.paused) {
          pauseIcon.style.display = "none";
          playIcon.style.display = "block";
        } else {
          pauseIcon.style.display = "block";
          playIcon.style.display = "none";
        }
      }

      function toggleVideoPlayback() {
        var video = document.querySelector("#video video");
        if (!video) return;

        if (video.paused) {
          var playPromise = video.play();
          if (playPromise && typeof playPromise.catch === "function") {
            playPromise.catch(function () {
              updateVideoPlaybackButton();
            });
          }
        } else {
          video.pause();
        }

        updateVideoPlaybackButton();
      }

      if (isVideoMode) {
        setVideoContent();
      }
    </script>
  </body>
</html>
