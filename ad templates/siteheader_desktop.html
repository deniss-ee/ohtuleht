      html,
      body,
      div,
      img,
      video,
      iframe,
      a,
      button {
        cursor: pointer;
        margin: 0;
        padding: 0;
      }
      a:focus,
      button:focus {
        outline: none;
      }
      button:hover {
        opacity: 1;
      }
      #container {
        position: absolute;
        height: 100%;
        width: 100%;
      }
      #canvas {
        display: block;
        height: 100%;
        width: 100%;
      }
      #sticky-canvas {
        display: none;
        height: 100%;
        width: 100%;
      }
      #tracking-code,
      #video-buttons,
      #html,
      #sticky-html {
        display: none;
      }
      video {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        z-index: 2;
      }
      #video-buttons > button {
        position: absolute;
        background-color: transparent;
        background-size: 30px;
        background-repeat: no-repeat;
        background-position: center;
        width: 48px;
        height: 48px;
        border: none;
        z-index: 10;
        opacity: 0.7;
        border-radius: 24px;
        top: 20px;
        right: 55px;
        cursor: pointer;
      }
      #video-buttons > button:focus {
        outline: none;
        box-shadow: none;
      }
      #video-buttons > button svg {
        pointer-events: none;
      }
      #video-control-audio {
        background-image: none !important;
      }
      #close {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 30px;
        height: 30px;
        border: none;
        background: rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(10px);
        border-radius: 50%;
        padding: 0;
        cursor: pointer;
        z-index: 11;
      }
      #close svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      @keyframes fadeIn {
        0% {
          opacity: 0.5;
        }
        100% {
          opacity: 1;
        }
      }

        position: absolute;
        top: 0px;
        z-index: 1;
        animation: fadeIn 0.5s;
      }

        width: 100%;
        height: 100%;
        z-index: 2;
        top: 0;
        display: none;
        cursor: pointer;

  <body>
    <div id="container">
      <div
        id="click-overlay"
        onclick="
          event.stopPropagation();
          banner.click();
        "></div>
      <div id="canvas">
        <div id="image" onclick="banner.click()"></div>
        <div id="video">
          <div id="video-buttons">
            <button
              id="video-control-audio"
              onclick="
                event.stopPropagation();

    <script>
      var banner = {
        build: function () {
          this.setVariables();
          this.fillCanvas();
          this.configureFrame();
          this.initDL();
        },

        setVariables: function () {
          this.variables = {};
          this.setVariable("adUnit", "%%ADUNIT%%");
          this.setVariable("cachebuster", "%%CACHEBUSTER%%");
          this.setVariable("clickMacroUrl", "%%CLICK_URL_ESC%%");
          this.setVariable("destinationUrl", "%%DEST_URL_ESC%%");
          this.setVariable("height", "[%height%]");
          this.setVariable("stickyHeight", "[%stickyHeight%]");
          this.setVariable("autoFullHeight", "[%autoFullHeight%]");
          this.setVariable("type", "[%type%]");
          this.setVariable("imageUrl", "[%imageUrl%]");
          this.setVariable("videoUrl", "[%videoUrl%]");
          this.setVariable("iframeUrl", "[%iframeUrl%]");
          this.setVariable("stickyImageUrl", "[%stickyImageUrl%]");
          this.setVariable("stickyIframeUrl", "[%stickyIframeUrl%]");
          this.setVariable("iframeClickTagType", "[%iframeClickTagType%]");
          this.setVariable("videoButtons", "[%videoButtons%]");
          this.setVariable("colorCode", "[%colorCode%]");
          this.setVariable("backgroundColorCode", "[%backgroundColorCode%]");
          this.setVariable("backgroundImage", "[%backgroundImage%]");
          this.setVariable("reTargetingPixelUrl", "[%reTargetingPixelUrl%]");
          this.setVariable("promoName", "[%promoName%]");
          this.setVariable("promoId", "[%promoId%]");
          this.setVariable("creativeName", "[%creativeName%]");
          this.setVariable("creativeSlot", "[%creativeSlot%]");
          this.setVariable("smallRibbon", "[%smallRibbon%]");
          this.setVariable("prevScroll", window.parent.onscroll);
        },

        setVariable: function (name, value) {
          this.variables[name] = value;
        },

        click: function (customDestinationUrl) {
          if (this.variables.reTargetingPixelUrl.length > 0) {
            this.appendReTargetingPixel();
          }
          if (!!this.variables.destinationUrl) {
            window.open(this.variables.clickMacroUrl + this.variables.destinationUrl, "_blank");
          }

          if (this.variables.promoName != "") {
            parent.dataLayer.push({ ecommerce: null });
            parent.dataLayer.push({
              event: "select_promotion",
              ecommerce: {
                creative_name: "" + this.variables.creativeName,
                creative_slot: "" + this.variables.creativeSlot,
                promotion_id: "" + this.variables.promoId,
                promotion_name: "" + this.variables.promoName,
                items: [
                  {
                    item_id: "1",
                    item_name: "Turundus",
                  },
                ],
              },
            });
          }
        },

        clickOnSlider: function () {
          if (this.variables.autoFullHeight === "yes") {
          }
        },

        initDL: function () {
          if (this.variables.promoName != "") {
            parent.dataLayer.push({ ecommerce: null });
            parent.dataLayer.push({
              event: "view_promotion",
              ecommerce: {
                creative_name: "" + this.variables.creativeName,
                creative_slot: "" + this.variables.creativeSlot,
                promotion_id: "" + this.variables.promoId,
                promotion_name: "" + this.variables.promoName,
                items: [
                  {
                    item_id: "1",
                    item_name: "Turundus",
                  },
                ],
              },
            });
          }
        },

        appendReTargetingPixel: function () {
          var pixelImg = document.createElement("img");
          pixelImg.src = this.variables.reTargetingPixelUrl;
          document.getElementById("container").appendChild(pixelImg);
        },

        fillCanvas: function () {
          if (this.variables.iframeClickTagType === "noopen") {
            this.setVariable("destinationUrl", "");
            this.setVariable("clickMacroUrl", "");
          }
          if (this.variables.autoFullHeight === "yes") {
            this.variables.height = window.parent.innerHeight;
            var out1 = window.parent.document.getElementById("outofpage");
            if (typeof out1 != "undefined" && out1 != null) {
              window.parent.document.getElementById("outofpage").style.display = "none";
            }
          }

          if (this.variables.imageUrl.length > 0) {
            this.setImageContent();
          } else if (this.variables.iframeUrl.length > 0) {
            this.setIframeContent();
          } else if (this.variables.videoUrl.length > 0) {
            this.setVideoContent();
          } else {
            document.getElementById("html").style.display = "block";
          }

          if (this.variables.stickyImageUrl.length > 0) {
            this.setStickyImageContent();
          } else if (this.variables.stickyIframeUrl.length > 0) {
            this.setStickyIframeContent();
          } else {
            document.getElementById("sticky-html").style.display = "block";
          }

          if (this.variables.autoFullHeight === "yes") {
            document.getElementById("slideup").style.display = "block";
            /*document.getElementById('slideup').onclick = function () { this.clickOnSlider() }.bind(this);*/
          }

          if (this.variables.iframeClickTagType === "simple") {
            document.getElementById("click-overlay").style.display = "block";
          }

          if (this.variables.colorCode.length > 0) {
            document.getElementById("container").style.backgroundColor = this.variables.colorCode;
          }

          if (this.variables.backgroundColorCode.length > 0 || this.variables.backgroundImage.length > 0) {
            this.setBackground();
          }

          document.getElementById("canvas").style.height = this.variables.height;
          document.getElementById("sticky-canvas").style.height = this.variables.stickyHeight;
        },

        setImageContent: function () {
          this.setStylesToElement(document.getElementById("image"), {
            width: this.variables.type === "responsive" ? "100%" : this.variables.type,
            height: this.variables.height + "px",
            backgroundImage: 'url("' + this.variables.imageUrl + '")',
            backgroundRepeat: "no-repeat",
            backgroundPosition: "center center",
            backgroundSize: "cover",
            backgroundColor: this.variables.colorCode,
            margin: "0 auto",
          });
        },

        setIframeContent: function () {
          var iframe = document.createElement("iframe");
          iframe.src = this.variables.iframeUrl + "?clickTag=" + this.variables.clickMacroUrl + this.variables.destinationUrl + "&clickMacro=" + this.variables.clickMacroUrl;
          iframe.scrolling = "no";
          iframe.rel = "nofollow";
          iframe.width = this.variables.type === "1280px" ? "1280px" : "100%";
          iframe.height = this.variables.height + "px";
          iframe.frameborder = "0px";
          iframe.style.border = "none";
          iframe.style.overflow = "hidden";
          iframe.style.transform = "translateX(-50%)";
          iframe.style.left = "50%";
          iframe.style.position = "absolute";
          iframe.align = "middle";
          document.getElementById("iframe").appendChild(iframe);
        },

        setVideoContent: function () {
          var video = document.createElement("video");
          video.autoplay = "autoplay";
          video.loop = "loop";
          video.muted = "muted";
          video.onclick = function () {
            this.click();
          }.bind(this);

          if (this.variables.autoFullHeight === "yes") {
            video.style.width = "100%";
          }

          document.getElementById("video").appendChild(video);

          var source = document.createElement("source");
          source.src = this.variables.videoUrl;
          document.getElementsByTagName("video")[0].appendChild(source);

          document.getElementById("video-buttons").style.display = this.variables.videoButtons === "visible" ? "block" : "none";
        },

        setStickyImageContent: function () {
          this.setStylesToElement(document.getElementById("sticky-image"), {
            width: this.variables.type === "responsive" ? "100%" : this.variables.type,
            height: this.variables.stickyHeight + "px",
            backgroundImage: 'url("' + this.variables.stickyImageUrl + '")',
            backgroundRepeat: "no-repeat",
            backgroundPosition: "center center",
            backgroundSize: "cover",
            backgroundColor: this.variables.colorCode,
            margin: "0 auto",
          });
        },

        setStickyIframeContent: function () {
          var iframe = document.createElement("iframe");
          iframe.src = this.variables.stickyIframeUrl + "?clickTag=" + this.variables.clickMacroUrl + this.variables.destinationUrl + "&clickMacro=" + this.variables.clickMacroUrl;
          iframe.scrolling = "no";
          iframe.rel = "nofollow";
          iframe.width = this.variables.type === "1280px" ? "1280px" : "100%";
          iframe.height = this.variables.stickyHeight + "px";
          iframe.frameborder = "0px";
          iframe.style.border = "none";
          iframe.style.overflow = "hidden";
          iframe.style.transform = "translateX(-50%)";
          iframe.style.left = "50%";
          iframe.style.position = "absolute";
          iframe.align = "middle";
          document.getElementById("sticky-iframe").appendChild(iframe);
        },

        setBackground: function () {
          if (this.variables.backgroundImage.length > 0) {
            this.appendStyleToParent('#background { display:block; cursor:pointer; position:fixed; background:url("' + this.variables.backgroundImage + '") center top !important; }');
          } else if (this.variables.backgroundColorCode.length > 0) {
            this.appendStyleToParent("#background { display:block; cursor:pointer; position:fixed; background-color: " + this.variables.backgroundColorCode + "; }");
          }

          window.parent.document.getElementById("background").onclick = function () {
            this.click();
          }.bind(this);
        },

        toggleVideoAudio: function () {
          var video = document.getElementsByTagName("video")[0];
          var button = document.getElementById("video-control-audio");
          var volumeOnIcon = button.querySelector(".volume-on");
          var volumeOffIcon = button.querySelector(".volume-off");

          if (video.muted) {
            video.muted = false;
            volumeOnIcon.style.display = "block";
            volumeOffIcon.style.display = "none";
          } else {
            video.muted = true;
            volumeOnIcon.style.display = "none";
            volumeOffIcon.style.display = "block";
          }
        },

        configureFrame: function () {
          this.setStylesToElement(window.frameElement, {
            width: "100vw",
          });

          this.setStylesToElement(window.parent.document.getElementById("sitehat"), {
            width: "100vw",
            zIndex: "900",
          });

          if (this.variables.autoFullHeight === "yes") {
            this.setStylesToElement(window.parent.document.getElementById("sitehat"), {
              zIndex: "10001",
            });
          }

          if (this.variables.adUnit.indexOf("kliendilehed") !== -1) {
            //window.parent.document.getElementsByClassName("header")[0].style.display = 'none';
          }

          this.setStylesToElement(window.parent.document.getElementsByClassName("page-subheader")[0], {
            position: ["sticky", "-webkit-sticky"],
          });

          this.parentResizieFunction();

          if (this.variables.smallRibbon === "false") {
            this.variables.stickyHeight = 0;
            this.variables.stickyHeightModified = 0;
          }

          this.parentScrollFunction();
          window.parent.document.addEventListener("scroll", this.parentScrollFunction.bind(this));
          window.parent.onresize = this.parentResizieFunction.bind(this);

          if (this.variables.smallRibbon !== "false") {
            this.appendStyleToParent("@media only screen and (min-width:1280px) { .sticky { top: " + eval(66 + (this.variables.type === "scaling" ? eval(this.variables.stickyHeightModified) : eval(this.variables.stickyHeight))) + "px; } }");
          }

          setTimeout(this.parentScrollFunction.bind(this), 100);
        },

        parentScrollFunction: function () {
          if (!this.scrollTrackingDisabled) {
            var height = this.variables.type === "scaling" ? this.variables.heightModified : this.variables.height,
              stickyHeight = this.variables.type === "scaling" ? this.variables.stickyHeightModified : this.variables.stickyHeight,
              scrollFromTop = window.parent.pageYOffset || window.parent.document.documentElement.scrollTop,
              ua = window.navigator.userAgent;

            if (scrollFromTop > eval(height - stickyHeight)) {
              if (window.parent.document.body.classList.contains("root-wrapper-prediction")) {
                this.setStylesToElement(window.parent.document.getElementsByClassName("root-wrapper-prediction")[0], {
                  marginTop: stickyHeight + "px",
                });
              }
              if (window.parent.document.body.classList.contains("root-wrapper")) {
                this.setStylesToElement(window.parent.document.getElementsByClassName("root-wrapper")[0], {
                  marginTop: stickyHeight + "px",
                });

                this.setStylesToElement(window.parent.document.getElementsByClassName("sticky-header")[0], {
                  position: "sticky",
                  zIndex: 1000,
                });
              }
              if (this.variables.adUnit.indexOf("kliendilehed") !== -1) {
                this.setStylesToElement(window.parent.document.getElementsByClassName("app_wrapper")[0], {
                  marginTop: stickyHeight + "px",
                });

                /*this.setStylesToElement(window.parent.document.getElementsByClassName('main-wrap')[0], {
									marginTop: stickyHeight + 'px',
			  				})
                
                this.setStylesToElement(window.parent.document.getElementsByClassName('header-wrap')[0], {
                	position: 'sticky',
                  zIndex: 1000,
              	})
                
                this.setStylesToElement(window.parent.document.getElementsByClassName('search-wrap')[0], {
                	//position: 'sticky',
                  zIndex: 1000,
              	})*/
              }
              this.setStylesToElement(window.frameElement, {
                height: stickyHeight + "px",
              });

              this.setStylesToElement(window.parent.document.getElementById("sitehat"), {
                top: "0px",
                height: stickyHeight + "px",
                position: "fixed",
              });

              this.setStylesToElement(window.parent.document.getElementsByClassName("sticky-header")[0], {
                top: stickyHeight + "px",
              });

              if (this.variables.adUnit.indexOf("kliendilehed") !== -1) {
                /*this.setStylesToElement(window.parent.document.getElementsByClassName('header-wrap')[0], {
                	top: stickyHeight + 'px',
              	})
                
                this.setStylesToElement(window.parent.document.getElementsByClassName('search-wrap')[0], {
                	top: stickyHeight + 'px',
              	})
                
                this.setStylesToElement(window.parent.document.getElementsByClassName('menu-wrap')[0], {
                	top: stickyHeight + 'px',
              	})*/
                /*väike*/
                window.parent.onscroll = function () {};
                this.setStylesToElement(window.parent.document.getElementsByClassName("header_menu")[0], {
                  top: stickyHeight + "px",
                });
              }

              this.setStylesToElement(window.parent.document.getElementsByClassName("page-subheader")[0], {
                top: stickyHeight + "px",
              });

              this.setStylesToElement(document.getElementById("canvas"), {
                display: "none",
              });

              this.setStylesToElement(document.getElementById("slideup"), {
                display: "none",
              });

              this.setStylesToElement(document.getElementById("sticky-canvas"), {
                display: "block",
              });

              // If IE, then help the navbar to be sticky.
              if (ua.indexOf("MSIE ") > 0 || !!navigator.userAgent.match(/Trident.*rv\:11\./)) {
                this.setStylesToElement(window.parent.document.getElementsByClassName("sticky-header")[0], {
                  position: "fixed",
                });

                this.setStylesToElement(window.parent.document.getElementsByClassName("page-subheader")[0], {
                  position: "fixed",
                });
              }
            } else if (scrollFromTop < eval(height - stickyHeight)) {
              if (window.parent.document.body.classList.contains("root-wrapper-prediction")) {
                this.setStylesToElement(window.parent.document.getElementsByClassName("root-wrapper-prediction")[0], {
                  marginTop: eval(height - scrollFromTop) + "px",
                });
              }
              if (window.parent.document.body.classList.contains("root-wrapper")) {
                this.setStylesToElement(window.parent.document.getElementsByClassName("root-wrapper")[0], {
                  marginTop: eval(height - scrollFromTop) + "px",
                });
                this.setStylesToElement(window.parent.document.getElementsByClassName("sticky-header")[0], {
                  top: eval(height - scrollFromTop) + "px",
                });
              }

              if (this.variables.adUnit.indexOf("kliendilehed") !== -1) {
                /*suur, null onscroll*/
                window.parent.onscroll = function () {};
                this.setStylesToElement(window.parent.document.getElementsByClassName("app_wrapper")[0], {
                  marginTop: eval(height - scrollFromTop) + "px",
                });

                this.setStylesToElement(window.parent.document.getElementsByClassName("header_menu")[0], {
                  top: eval(height - scrollFromTop) + "px",
                });

                /*this.setStylesToElement(window.parent.document.getElementsByClassName('main-wrap')[0], {
									marginTop: eval(height - scrollFromTop) + 'px',
			  				})
                
                this.setStylesToElement(window.parent.document.getElementsByClassName('header-wrap')[0], {
                	top: eval(height - scrollFromTop) + 'px',
              	})
                
                this.setStylesToElement(window.parent.document.getElementsByClassName('search-wrap')[0], {
                	top: eval(height - scrollFromTop) + 'px',
              	})
                
                this.setStylesToElement(window.parent.document.getElementsByClassName('menu-wrap')[0], {
                	top: eval(height - scrollFromTop) + 'px',
              	})*/
              }

              this.setStylesToElement(window.frameElement, {
                height: eval(height - scrollFromTop) + "px",
              });

              this.setStylesToElement(window.parent.document.getElementById("sitehat"), {
                top: "0px",
                height: eval(height - scrollFromTop) + "px",
                position: "fixed",
              });

              this.setStylesToElement(document.getElementById("canvas"), {
                display: "block",
              });

              this.setStylesToElement(document.getElementById("slideup"), {
                display: "none",
              });

              this.setStylesToElement(document.getElementById("sticky-canvas"), {
                display: "none",
              });

              if (this.variables.autoFullHeight === "yes") {
                this.setStylesToElement(document.getElementById("slideup"), { display: "block" });
              }
              // If IE, then help the navbar to be sticky.
              if (ua.indexOf("MSIE ") > 0 || !!navigator.userAgent.match(/Trident.*rv\:11\./)) {
                this.setStylesToElement(window.parent.document.getElementsByClassName("sticky-header")[0], {
                  position: "static",
                });

                this.setStylesToElement(window.parent.document.getElementsByClassName("page-subheader")[0], {
                  position: "static",
                });
              }
            }
          }
        },

        parentResizieFunction: function () {
          if (!this.scrollTrackingDisabled) {
            this.variables.heightModified = Math.floor(window.parent.innerWidth / (1920 / this.variables.height));
            this.variables.stickyHeightModified = Math.floor(window.parent.innerWidth / (1920 / this.variables.stickyHeight));

            this.setStylesToElement(window.parent.document.getElementsByClassName("root-wrapper")[0], {
              marginTop: (this.variables.type === "scaling" ? this.variables.heightModified : this.variables.height) + "px",
            });

            this.setStylesToElement(window.parent.document.getElementsByClassName("root-wrapper-prediction")[0], {
              marginTop: (this.variables.type === "scaling" ? this.variables.heightModified : this.variables.height) + "px",
            });

            if (this.variables.adUnit.indexOf("kliendilehed") !== -1) {
              this.setStylesToElement(window.parent.document.getElementsByClassName("main-wrap")[0], {
                marginTop: (this.variables.type === "scaling" ? this.variables.heightModified : this.variables.height) + "px",
              });

              this.setStylesToElement(window.parent.document.getElementsByClassName("app_wrapper")[0], {
                marginTop: (this.variables.type === "scaling" ? this.variables.heightModified : this.variables.height) + "px",
              });
            }

            this.parentScrollFunction();

            if (window.parent.innerWidth < 1280) {
              this.close();
            }
          }
        },

        setStylesToElement: function (el, styles) {
          if (el === null || typeof el == "undefined") {
            return null;
          }

          var keys = Object.keys(styles);
          keys.forEach(function (key) {
            if (Array.isArray(styles[key])) {
              var css = el.style.cssText;
              styles[key].forEach(function (value) {
                css = css + " " + key + ": " + value + ";";
              });
              el.style.cssText = css;
            } else {
              el.style[key] = styles[key];
            }
          });
        },

        appendStyleToParent: function (css) {
          var style = document.createElement("style");
          style.type = "text/css";

          if (style.styleSheet) {
            style.styleSheet.cssText = css;
          } else {
            style.appendChild(document.createTextNode(css));
          }

          window.parent.document.getElementById("sitehat").appendChild(style);
        },

        close: function () {
          this.scrollTrackingDisabled = true;
          window.parent.document.getElementById("sitehat").style.display = "none";
          var sth = window.parent.document.getElementsByClassName("sticky-header")[0];
          if (typeof sth != "undefined" && sth != null) {
            window.parent.document.getElementsByClassName("sticky-header")[0].style.top = "0px";
            window.parent.document.getElementsByClassName("root-wrapper")[0].style.marginTop = "0px";
          }

          /*var mnw = window.parent.document.getElementsByClassName('main-wrap')[0];
          if(typeof(mnw) != 'undefined' && mnw != null){
          	window.parent.document.getElementsByClassName('header-wrap')[0].style.top = '0px';
            window.parent.document.getElementsByClassName('search-wrap')[0].style.top = '0px';
            window.parent.document.getElementsByClassName('main-wrap')[0].style.marginTop = '0px';
            window.parent.document.getElementsByClassName('menu-wrap')[0].style.top = '0px';
          }*/

          var rpw = window.parent.document.getElementsByClassName("root-wrapper-prediction")[0];
          if (typeof rpw != "undefined" && rpw != null) {
            window.parent.document.getElementsByClassName("root-wrapper-prediction")[0].style.marginTop = "0px";
          }

          var apw = window.parent.document.getElementsByClassName("app_wrapper")[0];
          var sph = window.parent.document.getElementsByClassName("sitehatplaceholder")[0];
          if (typeof sph != "undefined" && sph != null) {
            window.parent.document.getElementsByClassName("sitehatplaceholder")[0].style.marginTop = "0px";
          }
          if (typeof apw != "undefined" && apw != null) {
            window.parent.document.getElementsByClassName("app_wrapper")[0].style.marginTop = "0px";
            window.parent.document.getElementsByClassName("header_menu")[0].style.top = "0px";
            window.parent.onscroll = this.variables.prevScroll;
          }

          var psh = window.parent.document.getElementsByClassName("page-subheader")[0];
          if (typeof psh != "undefined" && psh != null) {
            window.parent.document.getElementsByClassName("page-subheader")[0].style.position = "static";
            window.parent.document.getElementsByClassName("page-subheader")[0].style.top = "0px";
          }
          this.appendStyleToParent(".sticky { top: 66px; }");
          window.parent.document.removeEventListener("scroll", this.parentScrollFunction.bind(this));
          Array.from(window.parent.document.getElementById("sitehat").getElementsByTagName("style")).forEach(function (element) {
            element.innerHTML = "";
          });
        },
      };

      banner.build();
    </script>
  </body>
</html>
