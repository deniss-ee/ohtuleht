<!doctype html>
<html>
  <head>
    <meta http-equiv="Content-type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mobile siteheader fixed oh v1.3.7</title>
    <style>
      html,
      body,
      div,
      img,
      video,
      iframe,
      a,
      button {
        cursor: pointer;
        margin: 0;
        padding: 0;
      }
      a:focus,
      button:focus {
        outline: none;
      }
      button:hover {
        opacity: 1;
      }
      #container {
        position: absolute;
        height: 100%;
        width: 100%;
        cursor: pointer;
        background-color: white;
      }
      #canvas {
        display: block;
        height: 100%;
        width: 100%;
      }
      #sticky-canvas {
        display: none;
        height: 100%;
        width: 100%;
      }
      #click-overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 2;
        top: 0;
        display: none;
        cursor: pointer;
      }
      #tracking-code,
      #video-buttons,
      #html {
        display: none;
      }
      video {
        position: fixed;
        top: 50%;
        left: 50%;
        min-width: 100vw;
        min-height: 100vh;
        width: auto;
        height: auto;
        transform: translateX(-50%) translateY(-50%);
        z-index: 2;
      }
      #video-buttons > button {
        position: absolute;
        background-color: transparent;
        background-size: 30px;
        background-repeat: no-repeat;
        background-position: center;
        width: 48px;
        height: 48px;
        border: none;
        z-index: 10;
        opacity: 0.7;
        border-radius: 24px;
        top: 12px;
        right: 52px;
        cursor: pointer;
      }
      #video-buttons > button:focus {
        outline: none;
        box-shadow: none;
      }
      #video-buttons > button svg {
        pointer-events: none;
      }
      #video-control-audio {
        background-image: none !important;
      }
      #close {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 30px;
        height: 30px;
        border: none;
        background: rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(10px);
        border-radius: 50%;
        padding: 0;
        cursor: pointer;
        z-index: 11;
      }
      #close svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      @keyframes fadeIn {
        0% {
          opacity: 0.5;
        }
        100% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>

      <div
        id="click-overlay"
        onclick="
          event.stopPropagation();
          banner.click();
        "></div>

        <div id="sticky-iframe"></div>

    <script>
      var banner = {
        build: function () {
          this.setVariables();
          //var actualHeight = (window.frameElement.parentNode.parentNode.parentNode.parentNode.parentNode.clientWidth * 250) / 600;
          //var actualHeightSticky = (window.frameElement.parentNode.parentNode.parentNode.parentNode.parentNode.clientWidth * 100) / 600;
          this.fillCanvas();
          this.configureFrame();
          this.initDL();
        },

        setVariables: function () {
          this.variables = {};
          this.setVariable("adUnit", "%%ADUNIT%%");
          this.setVariable("cachebuster", "%%CACHEBUSTER%%");
          this.setVariable("clickMacroUrl", "%%CLICK_URL_ESC%%");
          this.setVariable("destinationUrl", "%%DEST_URL_ESC%%");
          //this.setVariable("height", (window.parent.innerWidth * "[%height%]") / 600);
          //this.setVariable("stickyHeight", (window.parent.innerWidth * "[%stickyHeight%]") / 600);
          this.setVariable("height", (window.frameElement.parentNode.parentNode.parentNode.parentNode.parentNode.clientWidth * 250) / 600);
          this.setVariable("stickyHeight", (window.frameElement.parentNode.parentNode.parentNode.parentNode.parentNode.clientWidth * 100) / 600);
          this.setVariable("imageUrl", "[%imageUrl%]");
          this.setVariable("videoUrl", "[%videoUrl%]");
          this.setVariable("iframeUrl", "[%iframeUrl%]");
          this.setVariable("stickyImageUrl", "[%stickyImageUrl%]");
          this.setVariable("stickyIframeUrl", "[%stickyIframeUrl%]");
          this.setVariable("iframeClickTagType", "[%iframeClickTagType%]");
          this.setVariable("videoButtons", "[%videoButtons%]");
          this.setVariable("reTargetingPixelUrl", "[%reTargetingPixelUrl%]");
          this.setVariable("promoName", "[%promoName%]");
          this.setVariable("promoId", "[%promoId%]");
          this.setVariable("creativeName", "[%creativeName%]");
          this.setVariable("creativeSlot", "[%creativeSlot%]");
          this.setVariable("smallRibbon", "[%smallRibbon%]");
          this.setVariable("prevScroll", window.parent.onscroll);
          this.setVariable("auth", "%%PATTERN:siteName%%");
          this.setVariable("newm", "%%PATTERN:NewMobilePage%%");
        },

        setVariable: function (name, value) {
          this.variables[name] = value;
        },

        click: function (customDestinationUrl) {
          if (this.variables.reTargetingPixelUrl.length > 0) {
            this.appendReTargetingPixel();
          }
          if (!!this.variables.destinationUrl) {
            window.open(this.variables.clickMacroUrl + this.variables.destinationUrl, "_blank");
          }

          if (this.variables.promoName != "") {
            parent.dataLayer.push({ ecommerce: null });
            parent.dataLayer.push({
              event: "select_promotion",
              ecommerce: {
                creative_name: "" + this.variables.creativeName,
                creative_slot: "" + this.variables.creativeSlot,
                promotion_id: "" + this.variables.promoId,
                promotion_name: "" + this.variables.promoName,
                items: [
                  {
                    item_id: "1",
                    item_name: "Turundus",
                  },
                ],
              },
            });
          }
        },

        initDL: function () {
          if (this.variables.promoName != "") {
            parent.dataLayer.push({ ecommerce: null });
            parent.dataLayer.push({
              event: "view_promotion",
              ecommerce: {
                creative_name: "" + this.variables.creativeName,
                creative_slot: "" + this.variables.creativeSlot,
                promotion_id: "" + this.variables.promoId,
                promotion_name: "" + this.variables.promoName,
                items: [
                  {
                    item_id: "1",
                    item_name: "Turundus",
                  },
                ],
              },
            });
          }
        },

        appendReTargetingPixel: function () {
          var pixelImg = document.createElement("img");
          pixelImg.src = this.variables.reTargetingPixelUrl;
          document.getElementById("container").appendChild(pixelImg);
        },

        fillCanvas: function () {
          if (this.variables.iframeClickTagType === "noopen") {
            this.setVariable("destinationUrl", "");
            this.setVariable("clickMacroUrl", "");
          }
          if (this.variables.imageUrl.length > 0) {
            this.setImageContent();
          } else if (this.variables.videoUrl.length > 0) {
            this.setVideoContent();
          } else if (this.variables.iframeUrl.length > 0) {
            this.setIframeContent();
          } else {
            document.getElementById("html").style.display = "block";
          }

          if (this.variables.stickyImageUrl.length > 0) {
            this.setStickyImageContent();
          } else if (this.variables.stickyIframeUrl.length > 0) {
            this.setStickyIframeContent();
          }

          if (this.variables.iframeClickTagType === "simple") {
            document.getElementById("click-overlay").style.display = "block";
          }

          if (this.variables.smallRibbon !== "false") {
            if ((window.parent.pageYOffset || window.parent.document.documentElement.scrollTop) > 0) {
              window.frameElement.style.height = this.variables.stickyHeight + "px";
              var sth = window.parent.document.getElementsByClassName("sticky-header")[0];
              if (typeof sth != "undefined" && sth != null) {
                window.parent.document.getElementsByClassName("sticky-header")[0].style.top = this.variables.stickyHeight + "px";
              }

              document.getElementById("canvas").style.display = "none";
              document.getElementById("sticky-canvas").style.display = "block";
            } else {
              document.getElementById("canvas").style.height = this.variables.height + "px";
              document.getElementById("sticky-canvas").style.height = this.variables.stickyHeight + "px";
            }
          } else {
            document.getElementById("canvas").style.height = this.variables.height + "px";
          }
        },

        setImageContent: function () {
          this.setStylesToElement(document.getElementById("image"), {
            width: "100%",
            height: this.variables.height + "px",
            backgroundImage: 'url("' + this.variables.imageUrl + '")',
            backgroundRepeat: "no-repeat",
            backgroundPosition: "center center",
            backgroundSize: "contain",
            margin: "0 auto",
          });
        },

        setStickyImageContent: function () {
          this.setStylesToElement(document.getElementById("sticky-image"), {
            width: "100%",
            height: this.variables.stickyHeight + "px",
            backgroundImage: 'url("' + this.variables.stickyImageUrl + '")',
            backgroundRepeat: "no-repeat",
            backgroundPosition: "center center",
            backgroundSize: "contain",
            margin: "0 auto",
          });
        },

        setIframeContent: function () {
          var iframe = document.createElement("iframe");
          iframe.src = this.variables.iframeUrl + "?clickTag=" + this.variables.clickMacroUrl + this.variables.destinationUrl + "&clickMacro=" + this.variables.clickMacroUrl;
          iframe.scrolling = "no";
          iframe.rel = "nofollow";
          iframe.width = "100%";
          iframe.height = this.variables.height + "px";
          iframe.frameborder = "0px";
          iframe.style.border = "none";
          iframe.style.overflow = "hidden";
          iframe.style.transform = "translateX(-50%)";
          iframe.style.left = "50%";
          iframe.style.position = "absolute";
          iframe.align = "middle";
          document.getElementById("iframe").appendChild(iframe);
        },

        setStickyIframeContent: function () {
          var iframe = document.createElement("iframe");
          iframe.src = this.variables.stickyIframeUrl + "?clickTag=" + this.variables.clickMacroUrl + this.variables.destinationUrl + "&clickMacro=" + this.variables.clickMacroUrl;
          iframe.scrolling = "no";
          iframe.rel = "nofollow";
          iframe.width = "100%";
          iframe.height = this.variables.stickyHeight + "px";
          iframe.frameborder = "0px";
          iframe.style.border = "none";
          iframe.style.overflow = "hidden";
          iframe.style.transform = "translateX(-50%)";
          iframe.style.left = "50%";
          iframe.style.position = "absolute";
          iframe.align = "middle";
          document.getElementById("sticky-iframe").appendChild(iframe);
        },

        setVideoContent: function () {
          var video = document.createElement("video");
          video.autoplay = "autoplay";
          video.loop = "loop";
          video.muted = "muted";
          video.setAttribute("playsinline", "");
          video.style.height = this.variables.height + "px";
          video.style.width = "100%";
          video.onclick = function () {
            this.click();
          }.bind(this);
          document.getElementById("video").appendChild(video);

          var source = document.createElement("source");
          source.src = this.variables.videoUrl;
          document.getElementsByTagName("video")[0].appendChild(source);

          document.getElementById("video-buttons").style.display = this.variables.videoButtons === "visible" ? "block" : "none";
        },

        toggleVideoAudio: function () {
          var video = document.getElementsByTagName("video")[0];
          var button = document.getElementById("video-control-audio");
          var volumeOnIcon = button.querySelector(".volume-on");
          var volumeOffIcon = button.querySelector(".volume-off");

          if (video.muted) {
            video.muted = false;
            volumeOnIcon.style.display = "block";
            volumeOffIcon.style.display = "none";
          } else {
            video.muted = true;
            volumeOnIcon.style.display = "none";
            volumeOffIcon.style.display = "block";
          }
        },

        configureFrame: function () {
          const pw = window.frameElement?.parentNode?.parentNode?.parentNode?.getBoundingClientRect().width ?? window.innerWidth;
          var isDs = pw >= 1000;

          if (this.variables.smallRibbon !== "false") {
            this.setStylesToElement(window.frameElement.parentNode.parentNode.parentNode, {
              height: "auto",
              marginTop: this.variables.height + "px",
              width: "100%",
              zIndex: "9001",
            });
          }

          if (typeof window.parent.document.getElementsByClassName("root-wrapper-prediction")[0] != "undefined") {
            window.parent.document.getElementsByClassName("root-wrapper-prediction")[0].style.marginTop = "0px";
            if (this.variables.smallRibbon !== "false") {
              this.setStylesToElement(window.frameElement.parentNode.parentNode.parentNode, {
                marginTop: "0px",
              });
            }
          }

          this.setStylesToElement(window.frameElement, {
            height: this.variables.height + "px",
            position: this.variables.smallRibbon !== "false" ? "fixed" : "relative",
            top: "0px",
            left: "0px",
            zIndex: "9001",
            width: window.frameElement.parentNode.parentNode.parentNode.parentNode.parentNode.clientWidth + "px",
            maxWidth: "100%",
          });

          this.setStylesToElement(window.parent.document.getElementsByClassName("page-header")[0], {
            position: ["sticky", "-webkit-sticky"],
          });

          if (window.parent.innerWidth < 768 && typeof window.parent.document.getElementsByClassName("page-subheader--inner")[0] != "undefined") {
            window.parent.document.getElementsByClassName("page-subheader--inner")[0].style.marginTop = "0px";
          }

          /*if(this.variables.adUnit.indexOf("kliendilehed") !== -1){
            this.setStylesToElement(window.parent.document.getElementsByClassName("header_menu")[0], {
              height: "60px",
            });
          }*/

          if (this.variables.auth === "ohtuleht-mobile") {
            if (isDs) {
              /*let this stay, sh probably changes*/
              /*this.setStylesToElement(window.frameElement, {
                width: pw + 'px',
                width: '500px',
                height: "250px",
                position: 'fixed',
                left: '50%',
                transform: 'translateX(-50%)',
              });*/
            }
          }

          if (this.variables.smallRibbon !== "false") {
            this.trackScrolling = true;
            window.parent.document.addEventListener("scroll", this.parentScrollFunction.bind(this));
          }
        },

        parentScrollFunction: function () {
          if (this.trackScrolling) {
            var scrollFromTop = window.parent.pageYOffset || window.parent.document.documentElement.scrollTop;

            if (this.variables.adUnit.indexOf("kliendilehed") !== -1) {
              if (scrollFromTop > eval(this.variables.height - this.variables.stickyHeight)) {
                /*void previous onscroll*/
                window.parent.onscroll = function () {};
                window.frameElement.style.height = this.variables.stickyHeight + "px";
                window.parent.document.getElementsByClassName("header_menu")[0].style.top = eval(this.variables.stickyHeight - 3) + "px";
                //window.parent.document.getElementsByClassName("header_menu")[0].style.height = "60px";
                document.getElementById("canvas").style.display = "none";
                document.getElementById("sticky-canvas").style.display = "block";
              } else if (scrollFromTop < eval(this.variables.height - this.variables.stickyHeight)) {
                window.parent.onscroll = this.variables.prevScroll;
                window.frameElement.style.height = eval(this.variables.height - scrollFromTop) + "px";
                window.parent.document.getElementsByClassName("header_menu")[0].style.top = eval(this.variables.height - scrollFromTop) + "px";
                //window.parent.document.getElementsByClassName("header_menu")[0].style.height = "60px";
                document.getElementById("canvas").style.display = "block";
                document.getElementById("sticky-canvas").style.display = "none";
              }
            } else {
              if (scrollFromTop > eval(this.variables.height - this.variables.stickyHeight)) {
                window.frameElement.style.height = this.variables.stickyHeight + "px";
                window.parent.document.getElementsByClassName("sticky-header")[0].style.top = this.variables.stickyHeight + "px";
                document.getElementById("canvas").style.display = "none";
                document.getElementById("sticky-canvas").style.display = "block";
              } else if (scrollFromTop < eval(this.variables.height - this.variables.stickyHeight)) {
                window.frameElement.style.height = eval(this.variables.height - scrollFromTop) + "px";
                window.parent.document.getElementsByClassName("sticky-header")[0].style.top = "0";
                document.getElementById("canvas").style.display = "block";
                document.getElementById("sticky-canvas").style.display = "none";
              }
            }
          }
        },

        setStylesToElement: function (el, styles) {
          if (el === null || typeof el == "undefined") {
            return null;
          }

          var keys = Object.keys(styles);
          keys.forEach(function (key) {
            if (Array.isArray(styles[key])) {
              var css = el.style.cssText;
              styles[key].forEach(function (value) {
                css = css + " " + key + ": " + value + ";";
              });
              el.style.cssText = css;
            } else {
              el.style[key] = styles[key];
            }
          });
        },

        close: function () {
          if (typeof window.parent.document.getElementsByClassName("sticky-header")[0] != "undefined") {
            window.parent.document.getElementsByClassName("sticky-header")[0].style.top = "0";
          }

          if (typeof window.parent.document.getElementsByClassName("page-header")[0] != "undefined") {
            window.parent.document.getElementsByClassName("page-header")[0].style.position = "";
          }

          var mnw = window.parent.document.getElementsByClassName("main_wrapper")[0];
          if (typeof mnw != "undefined" && mnw != null) {
            window.parent.document.getElementsByClassName("header_menu")[0].style.top = "0";
            window.parent.document.getElementsByClassName("header_menu")[0].style.marginTop = "0";
            window.parent.document.getElementsByClassName("header_menu")[0].style.height = "60px";
            window.parent.document.getElementById("sitehat").style.display = "none";
            window.parent.onscroll = this.variables.prevScroll;
          } else {
            window.frameElement.parentNode.parentNode.parentNode.style.display = "none";
          }

          window.parent.document.removeEventListener("scroll", this.parentScrollFunction.bind(this));
          this.trackScrolling = false;
        },
      };

      banner.build();
    </script>
  </body>
</html>
