<!doctype html>
<html>
  <head>
    <meta http-equiv="Content-type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pagebreak v1.1.20</title>
    <style>
      html,
      body,
      div,
      img,
      video,
      iframe,
      a,
      button {
        cursor: pointer;
        margin: 0;
        padding: 0;
      }
      a:focus,
      button:focus {
        outline: none;
      }
      body {
        background-color: #eaeaea;
      }
      #container {
        position: absolute;
        height: 100%;
        width: 100%;
      }
      #canvas {
        position: absolute;
        height: 100%;
        width: 100%;
        margin-top: 20px;
        margin-bottom: 20px;
      }
      #top-padding-bar,
      #bottom-padding-bar {
        position: absolute;
        z-index: 2;
        background-color: #ffffff;
        width: 100%;
        height: 20px;
      }
      #top-padding-bar {
        top: -20px;
      }
      #bottom-padding-bar {
        bottom: 20px;
      }
      #tracking-code,
      #video-buttons,
      #html {
        display: none;
      }
      video {
        position: fixed;
        top: 50%;
        left: 50%;
        min-width: 100vw;
        min-height: 100vh;
        width: auto;
        height: auto;
        transform: translateX(-50%) translateY(-50%);
      }
      #video-buttons > button {
        position: absolute;
        background-color: transparent;
        background-size: 30px;
        background-repeat: no-repeat;
        background-position: center;
        width: 48px;
        height: 48px;
        border: none;
        z-index: 100;
        opacity: 0.7;
        border-radius: 24px;
        top: 10px;
        right: 30px;
        cursor: pointer;
        display: inline-block;
      }
      #video-buttons > button:hover {
        opacity: 1;
      }
      #video-buttons > button:focus {
        outline: none;
        box-shadow: none;
      }
      #video-buttons > button svg {
        pointer-events: none;
      }
      #video-control-audio {
        background-image: none !important;
      }
      #click-overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 1;
        top: 0;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div
        id="click-overlay"
        onclick="
          event.stopPropagation();
          banner.click();
        "></div>
      <div id="canvas">
        <div id="top-padding-bar"></div>
        <div id="image" onclick="banner.click()"></div>
        <div id="video">
          <div id="video-buttons">
            <button
              id="video-control-audio"
              onclick="
                event.stopPropagation();
                banner.toggleVideoAudio();
              ">
              <!-- Volume On SVG (shown when video is unmuted) -->

                  fill="white"></path>

              <!-- Volume Off SVG (shown when video is muted - initial state) -->
              <svg class="volume-off" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
                <path
                  d="M35.5271 25.6305L30.7921 30.396C30.5691 30.619 30.3058 30.7338 30.0021 30.7405C29.6981 30.7468 29.4346 30.632 29.2116 30.396C28.9756 30.1603 28.8576 29.8887 28.8576 29.581C28.8576 29.273 28.9756 29.0012 29.2116 28.7655L33.9271 24.031L29.1616 19.296C28.9386 19.073 28.8239 18.8128 28.8176 18.5155C28.8109 18.2182 28.9256 17.9515 29.1616 17.7155C29.3976 17.4795 29.6726 17.3615 29.9866 17.3615C30.3006 17.3615 30.5691 17.4795 30.7921 17.7155L35.5271 22.431L40.2616 17.6655C40.4846 17.4425 40.7481 17.331 41.0521 17.331C41.3558 17.331 41.6256 17.4425 41.8616 17.6655C42.0976 17.9015 42.2156 18.1765 42.2156 18.4905C42.2156 18.8045 42.0976 19.073 41.8616 19.296L37.1271 24.031L41.8921 28.7655C42.1154 28.9885 42.2303 29.252 42.2366 29.556C42.2429 29.8597 42.1281 30.1295 41.8921 30.3655C41.6564 30.6012 41.3848 30.719 41.0771 30.719C40.7694 30.719 40.4976 30.6012 40.2616 30.3655L35.5271 25.6305ZM14.7311 29H8.75011C8.32977 29 7.98427 28.8647 7.71361 28.594C7.44327 28.3237 7.30811 27.9782 7.30811 27.5575V20.4425C7.30811 20.0218 7.44327 19.6763 7.71361 19.406C7.98427 19.1353 8.32977 19 8.75011 19H14.7311L21.3346 12.3965C21.6986 12.0322 22.1184 11.9462 22.5941 12.1385C23.0698 12.3308 23.3076 12.677 23.3076 13.177V34.8035C23.3076 35.3165 23.0698 35.6692 22.5941 35.8615C22.1184 36.0538 21.6986 35.9678 21.3346 35.6035L14.7311 29ZM21.0386 16.1575L15.7541 21.2695H9.5771V26.7305H15.7541L21.0386 31.873V16.1575Z"
                  fill="white"></path>
              </svg>
            </button>
          </div>
        </div>
        <div id="iframe"></div>
        <div id="html">[%html%]</div>
        <div id="bottom-padding-bar"></div>
      </div>
      <div id="tracking-code">[%trackingCode%]</div>
    </div>

    <script>
      var banner = {
        build: function () {
          this.setVariables();
          this.fillCanvas();
          this.configureFrame();
        },

        setVariables: function () {
          this.variables = {};
          this.setVariable("adUnit", "%%ADUNIT%%");
          this.setVariable("width", "%%WIDTH%%");
          this.setVariable("height", "%%HEIGHT%%");
          this.setVariable("cachebuster", "%%CACHEBUSTER%%");
          this.setVariable("clickMacroUrl", "%%CLICK_URL_ESC%%");
          this.setVariable("destinationUrl", "%%DEST_URL_ESC%%");
          this.setVariable("type", "[%type%]");
          this.setVariable("imageUrl", "[%imageUrl%]");
          this.setVariable("videoUrl", "[%videoUrl%]");
          this.setVariable("iframeUrl", "[%iframeUrl%]");
          this.setVariable("iframeClickTagType", "[%iframeClickTagType%]");
          this.setVariable("videoButtons", "[%videoButtons%]");
          this.setVariable("reTargetingPixelUrl", "[%reTargetingPixelUrl%]");
          this.setVariable("newm", "%%PATTERN:NewMobilePage%%");
          this.setVariable("auth", "%%PATTERN:siteName%%");
        },

        setVariable: function (name, value) {
          this.variables[name] = value.length > 0 ? value : "";
        },

        click: function () {
          if (this.variables.reTargetingPixelUrl.length > 0) {
            this.appendReTargetingPixel();
          }
          window.open(this.variables.clickMacroUrl + this.variables.destinationUrl, "_blank");
        },

        appendReTargetingPixel: function () {
          var pixelImg = document.createElement("img");
          pixelImg.src = this.variables.reTargetingPixelUrl;
          document.getElementById("container").appendChild(pixelImg);
        },

        fillCanvas: function () {
          if (this.variables.imageUrl.length > 0) {
            this.setImageContent();
          } else if (this.variables.videoUrl.length > 0) {
            this.setVideoContent();
          } else if (this.variables.iframeUrl.length > 0) {
            this.setIframeContent();
          } else {
            document.getElementById("html").style.display = "block";
          }

          if (this.variables.iframeClickTagType === "simple") {
            document.getElementById("click-overlay").style.display = "block";
          }
        },

        setImageContent: function () {
          this.setStylesToElement(document.getElementById("image"), {
            width: "100%",
            height: "calc(100% - 40px)",
            backgroundImage: 'url("' + this.variables.imageUrl + '")',
            backgroundRepeat: "no-repeat",
            backgroundPosition: "center center",
            backgroundSize: this.variables.type != "responsive" ? "contain" : "cover",
          });
        },

        setVideoContent: function () {
          var video = document.createElement("video");
          video.autoplay = "autoplay";
          video.loop = "loop";
          video.muted = "muted";
          video.setAttribute("playsinline", "playsinline");
          video.setAttribute("webkit-playsinline", "webkit-playsinline");
          video.onclick = function () {
            this.click();
          }.bind(this);
          document.getElementById("video").appendChild(video);

          var source = document.createElement("source");
          source.src = this.variables.videoUrl;
          document.getElementsByTagName("video")[0].appendChild(source);

          document.getElementById("video-buttons").style.display = this.variables.videoButtons === "visible" ? "block" : "none";

          this.setStylesToElement(document.getElementsByTagName("video")[0], {
            width: "100%",
            height: "100%",
          });
        },

        setIframeContent: function () {
          var iframe = document.createElement("iframe");
          iframe.src = this.variables.iframeUrl + "?clickTag=" + this.variables.clickMacroUrl + this.variables.destinationUrl + "&clickMacro=" + this.variables.clickMacroUrl;
          iframe.scrolling = "no";
          iframe.rel = "nofollow";
          iframe.width = "100%";
          iframe.height = "100%";
          iframe.frameborder = "0px";
          iframe.style.border = "none";
          iframe.style.overflow = "hidden";

          if (this.variables.type === "responsive") {
            iframe.style.height = "100vh";
          } else if (this.variables.type === "16:9") {
            iframe.style.height = 100 / (16 / 9) + "vw";
          } else if (this.variables.type === "9:16") {
            iframe.style.height = 100 / (9 / 16) + "vw";
          }

          document.getElementById("iframe").appendChild(iframe);
        },

        toggleVideoAudio: function () {
          var video = document.getElementsByTagName("video")[0];
          var button = document.getElementById("video-control-audio");
          var volumeOnIcon = button.querySelector(".volume-on");
          var volumeOffIcon = button.querySelector(".volume-off");

          if (video.muted) {
            // Unmute video and show volume-on icon
            video.muted = false;
            volumeOnIcon.style.display = "block";
            volumeOffIcon.style.display = "none";
          } else {
            // Mute video and show volume-off icon
            video.muted = true;
            volumeOnIcon.style.display = "none";
            volumeOffIcon.style.display = "block";
          }
        },

        configureFrame: function () {
          this.setStylesToElement(window.frameElement, {
            position: "absolute",
            width: "100vw",
            transform: "translateX(-50%)",
            zIndex: "49",
          });

          if (this.variables.type === "responsive") {
            window.frameElement.style.height = "calc(100vh + 40px)";
            window.frameElement.parentNode.style.height = "calc(100vh + 40px)";
          } else if (this.variables.type === "16:9") {
            window.frameElement.style.height = "calc(" + 100 / (16 / 9) + "vw + 40px)";
            window.frameElement.parentNode.style.height = "calc(" + 100 / (16 / 9) + "vw + 40px)";
          } else if (this.variables.type === "9:16") {
            window.frameElement.style.height = "calc(" + 100 / (9 / 16) + "vw + 40px)";
            window.frameElement.parentNode.style.height = "calc(" + 100 / (9 / 16) + "vw + 40px)";
          }

          if (this.variables.auth != "ohtuleht-mobile") {
            this.setStylesToElement(window.frameElement, {});
            this.setStylesToElement(window.frameElement.parentNode, {
              marginTop: "-20px",
              marginBottom: "-20px",
            });
          } else {
            //svelte
            this.setStylesToElement(window.frameElement, {
              //bottom: '70px',
            });
          }
        },

        setStylesToElement: function (el, styles) {
          if (el === null || typeof el == "undefined") {
            return null;
          }
          var keys = Object.keys(styles);
          keys.forEach(function (key) {
            if (Array.isArray(styles[key])) {
              var css = el.style.cssText;
              styles[key].forEach(function (value) {
                css = css + " " + key + ": " + value + ";";
              });
              el.style.cssText = css;
            } else {
              el.style[key] = styles[key];
            }
          });
        },
      };

      banner.build();
    </script>
  </body>
</html>
