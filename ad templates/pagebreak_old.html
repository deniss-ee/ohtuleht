<!doctype html>
<html>
  <head>
    <meta http-equiv="Content-type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pagebreak Interscroller v3.0.0</title>
    <style>
      html,
      body,
      div,
      img,
      video,
      iframe,
      a,
      button {
        cursor: pointer;
        margin: 0;
        padding: 0;
      }
      a:focus,
      button:focus {
        outline: none;
      }
      button:hover {
        opacity: 1;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }
      #impression-code {
        display: none;
      }
      #video-controls {
        display: none;
        position: absolute;
        top: 10px;
        right: 30px;
        z-index: 100;
      }
      #video-controls > button {
        position: relative;
        background-color: transparent;
        background-size: 30px;
        background-repeat: no-repeat;
        background-position: center;
        width: 48px;
        height: 48px;
        border: none;
        opacity: 0.7;
        border-radius: 24px;
        cursor: pointer;
        display: inline-block;
      }
      #video-controls > button:hover {
        opacity: 1;
      }
      #video-controls > button:focus {
        outline: none;
        box-shadow: none;
      }
      #video-controls > button svg {
        pointer-events: none;
      }
      #video-control-audio {
        background-image: none !important;
      }
      #click-overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 1;
        top: 0;
        display: none;
      }
      #container {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        padding: 0;
        margin: 0;
        background-color: black;
        font:
          400 16px/1.5 "Roboto",
          sans-serif;
        position: relative;
      }
      #container:focus {
        outline: none;
      }
      #canvas {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        height: calc(100vh - 70px);
        width: calc((100vh - 70px) * 9 / 16);
        background-color: black;
        overflow: hidden;
      }
      #canvas:focus {
        outline: none;
      }
      #image,
      #video,
      #iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      #image:focus,
      #video:focus,
      #iframe:focus {
        outline: none;
      }
      #image img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }
      #video video {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }
      #iframe iframe {
        width: 100%;
        height: 100%;
        border: none;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div
        id="click-overlay"
        onclick="
          event.stopPropagation();
          banner.handleClick();
        "></div>
      <div id="canvas">
        <div id="image" onclick="banner.handleClick()"></div>
        <div id="video">
          <video autoplay loop muted playsinline onclick="banner.handleClick()"></video>
          <div id="video-controls">
            <button
              id="video-control-audio"
              onclick="
                event.stopPropagation();
                banner.toggleVideoAudio();
              ">
              <svg class="volume-on" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none" style="display: none">

                  fill="white"></path>
              </svg>
            </button>
          </div>
        </div>
        <div id="iframe"></div>
      </div>
      <img id="impression-code" src="[%ThirdPartyImpressionTracker%]" />
    </div>
    <script>
      var banner = {
        EXTRA_SCROLL_ROOM_PX: 60,

        build: function () {
          this.setVariables();
          this.fillCanvas();
          this.configureFrame();
        },

        setVariables: function () {
          this.variables = {};
          this.setVariable("adUnit", "%%ADUNIT%%");
          this.setVariable("cachebuster", "%%CACHEBUSTER%%");
          this.setVariable("clickMacroUrl", "%%CLICK_URL_ESC%%");
          this.setVariable("destinationUrl", "%%DEST_URL_ESC%%");
          this.setVariable("imageUrl", "[%imageUrl%]");
          this.setVariable("videoUrl", "[%videoUrl%]");
          this.setVariable("iframeUrl", "[%iframeUrl%]");
          this.setVariable("videoControls", "[%videoControls%]");
          this.setVariable("iframeClickTagType", "[%iframeClickTagType%]");
          this.setVariable("clickTag", "[%clickTag%]");
        },

        setVariable: function (name, value) {
          this.variables[name] = value.length > 0 ? value : "";
        },

        handleClick: function () {
          this.openDestination();
        },

        openDestination: function () {
          var clickUrl = this.variables.clickMacroUrl + this.variables.destinationUrl;
          window.open(clickUrl, "_blank");
        },

        fillCanvas: function () {
          if (this.variables.videoUrl.length > 0) {
            this.setVideoContent();
          } else if (this.variables.imageUrl.length > 0) {
            this.setImageContent();
          } else if (this.variables.iframeUrl.length > 0) {
            this.setIframeContent();
          }
          if (this.variables.iframeClickTagType === "simple") {
            document.getElementById("click-overlay").style.display = "block";
          }
        },

        setVideoContent: function () {
          var video = document.querySelector("#video video");
          var source = document.createElement("source");
          source.src = this.variables.videoUrl;
          source.type = "video/mp4";
          video.appendChild(source);
          if (this.variables.videoControls === "visible") {
            document.getElementById("video-controls").style.display = "block";
          }
        },

        setImageContent: function () {
          var image = document.createElement("img");
          image.src = this.variables.imageUrl;
          image.style.width = "100%";
          image.style.height = "100%";
          image.style.objectFit = "contain";
          document.getElementById("image").appendChild(image);
        },

        setIframeContent: function () {
          var iframe = document.createElement("iframe");
          iframe.src = this.variables.iframeUrl + "?clickTag=" + this.variables.clickMacroUrl + this.variables.destinationUrl + "&clickMacro=" + this.variables.clickMacroUrl;
          iframe.scrolling = "no";
          iframe.rel = "nofollow";
          iframe.width = "100%";
          iframe.height = "100%";
          iframe.frameborder = "0";
          iframe.style.border = "none";
          iframe.style.overflow = "hidden";
          document.getElementById("iframe").appendChild(iframe);
        },

        configureFrame: function () {
          if (!window.frameElement) {
            this.setupInFlowFallback();
            return;
          }

          var friendly = this.setupInterscroller();
          if (!friendly) {
            this.setupInFlowFallback();
          }
        },

        setupInterscroller: function () {
          try {
            var gptIframe = window.frameElement;
            var parentDoc = window.parent.document;
            var parentWin = window.parent;

            // Probe parent access — throws on cross-origin
            var probe = parentDoc.body;
            if (!probe) return false;

            var slot = gptIframe.parentElement;
            if (!slot) return false;

            // Walk up to find a role="region" container if present (publisher slot wrapper)
            var cursor = slot;
            while (cursor && cursor !== parentDoc.body) {
              if (cursor.getAttribute && cursor.getAttribute("role") === "region") {
                slot = cursor;
                break;
              }
              cursor = cursor.parentElement;
            }

            var EXTRA_SCROLL_ROOM_PX = this.EXTRA_SCROLL_ROOM_PX;

            // Force the slot tall enough to give the parallax some scroll room
            slot.style.setProperty("position", "relative", "important");
            slot.style.setProperty("height", "calc(100vh + " + EXTRA_SCROLL_ROOM_PX + "px)", "important");
            slot.style.setProperty("width", "100vw", "important");
            slot.style.setProperty("margin-left", "calc(50% - 50vw)", "important");
            slot.style.setProperty("overflow", "hidden", "important");

            // Pin the iframe to the viewport — clipPath will reveal only inside the slot
            this.setStylesToElement(gptIframe, {
              position: "fixed",
              top: "0",
              left: "0",
              width: "100vw",
              height: "100vh",
              border: "0",
              zIndex: "0",
            });

            var BOTTOM_MENU_PX = 70;
            var canvas = document.getElementById("canvas");
            var clipUpdateScheduled = false;

            function clipAdToGap() {
              var slotRect = slot.getBoundingClientRect();
              var vpHeight = parentWin.innerHeight;
              var usefulBottom = vpHeight - BOTTOM_MENU_PX;
              var top = Math.max(0, slotRect.top);
              var bottom = Math.min(usefulBottom, slotRect.bottom);

              if (top < bottom) {
                gptIframe.style.clipPath = "inset(" + top + "px 0px " + (vpHeight - bottom) + "px 0px)";
                gptIframe.style.webkitClipPath = "inset(" + top + "px 0px " + (vpHeight - bottom) + "px 0px)";
                gptIframe.style.opacity = "1";
                gptIframe.style.visibility = "visible";
                gptIframe.style.pointerEvents = "auto";

                // Center canvas in the visible useful reveal area (excluding the 70px bottom menu).
                if (canvas) {
                  var visibleCenter = (top + bottom) / 2;
                  canvas.style.top = visibleCenter + "px";
                }
              } else {
                gptIframe.style.clipPath = "inset(100% 0px 0px 0px)";
                gptIframe.style.webkitClipPath = "inset(100% 0px 0px 0px)";
                gptIframe.style.opacity = "0";
                gptIframe.style.visibility = "hidden";
                gptIframe.style.pointerEvents = "none";
              }
            }

            function scheduleClipUpdate() {
              if (clipUpdateScheduled) return;
              clipUpdateScheduled = true;
              parentWin.requestAnimationFrame(function () {
                clipUpdateScheduled = false;
                clipAdToGap();
              });
            }

            // Initial clip + listeners
            clipAdToGap();
            parentWin.addEventListener("scroll", scheduleClipUpdate, { passive: true });
            parentWin.addEventListener("resize", scheduleClipUpdate, { passive: true });

            return true;
          } catch (e) {
            return false;
          }
        },

        setupInFlowFallback: function () {
          // Cross-origin or no frameElement: behave like the old pagebreak — fixed-aspect band, no parallax.
          // Canvas is already aspect-ratio: 1080/1920 (9:16). Just size the iframe to match.
          if (!window.frameElement) return;

          this.setStylesToElement(window.frameElement, {
            position: "absolute",
            width: "100vw",
            transform: "translateX(-50%)",
            left: "50%",
            height: "calc(" + 100 / (9 / 16) + "vw)",
            zIndex: "49",
          });

          // Container becomes block-flow inside the band
          var container = document.getElementById("container");
          if (container) {
            container.style.height = "100%";
          }
        },

        toggleVideoAudio: function () {
          var video = document.querySelector("#video video");
          var button = document.getElementById("video-control-audio");
          var volumeOnIcon = button.querySelector(".volume-on");
          var volumeOffIcon = button.querySelector(".volume-off");
          if (video.muted) {
            video.muted = false;
            volumeOnIcon.style.display = "block";
            volumeOffIcon.style.display = "none";
          } else {
            video.muted = true;
            volumeOnIcon.style.display = "none";
            volumeOffIcon.style.display = "block";
          }
        },

        setStylesToElement: function (el, styles) {
          if (el === null || typeof el == "undefined") return null;
          var keys = Object.keys(styles);
          keys.forEach(function (key) {
            if (Array.isArray(styles[key])) {
              var css = el.style.cssText;
              styles[key].forEach(function (value) {
                css = css + " " + key + ": " + value + ";";
              });
              el.style.cssText = css;
            } else {
              el.style[key] = styles[key];
            }
          });
        },
      };

      banner.build();
    </script>
  </body>
</html>
